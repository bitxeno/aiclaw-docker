services:
  aiclaw:
    image: ghcr.io/bitxeno/aiclaw-docker:latest
    container_name: aiclaw
    ports:
      - "${OPENCLAW_GATEWAY_PORT}:18789"
      - "${OPENCLAW_BRIDGE_PORT}:18790"
      - "${OPENCODE_PORT}:4096"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./.openclaw:/root/.openclaw
      - ./.opencode/config:/root/.config/opencode
      - ./.opencode/data:/root/.local/share/opencode
    restart: unless-stopped
    networks:
      - aiclaw-network

networks:
  aiclaw-network:
    driver: bridge
